[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Los nombres de pestañas no son secretos reales; omitir del secrets scan
  SECRETS_SCAN_OMIT_KEYS = "TAB_FACTURAS,TAB_VENTAS,TAB_MERMA"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Funciones programadas (Informes automáticos) ──────────────────────────────
# Variables de entorno requeridas en el panel de Netlify:
#   CRON_SECRET, NEXT_PUBLIC_BASE_URL, REPORT_RECIPIENTS, RESEND_API_KEY, RESEND_FROM

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Informe semanal — martes a las 09:00 hora Chile (UTC-3 → 12:00 UTC)
# Cubre lunes a viernes de la semana anterior
[[scheduled_functions]]
  name = "report-weekly"
  cron = "0 12 * * 2"

# Informe mensual — día 1 de cada mes a las 09:00 hora Chile (UTC-3 → 12:00 UTC)
# Cubre el mes anterior completo
[[scheduled_functions]]
  name = "report-monthly"
  cron = "0 12 1 * *"
